<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.25);
      padding: 34px 30px;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #2563eb;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      margin: 0 auto 18px auto;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin: 0 0 8px 0;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.4;
    }

    label {
      display: block;
      text-align: left;
      font-weight: bold;
      margin-bottom: 8px;
      color: #374151;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:active {
      transform: scale(0.99);
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
    }

    .student-note {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #e5e7eb;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      line-height: 1.45;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="logo">A</div>

    <h1>Admin Login</h1>

    <div class="subtitle">
      Zugriff auf die Werkzeugverwaltung und administrative Funktionen
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">Benutzername</label>
      <input
        id="username"
        type="text"
        name="username"
        placeholder="Benutzername eingeben"
        autocomplete="username"
        required
      >

      <label for="password">Passwort</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="Passwort eingeben"
        autocomplete="current-password"
        required
      >

      <button type="submit">Anmelden</button>
    </form>

    <div class="student-note">
      Studenten nutzen das Portal über den QR-Code am jeweiligen Werkzeug.
      Dafür ist kein Admin-Login erforderlich.
    </div>

    <div class="footer">
      Labormanagementsystem · Adminbereich
    </div>
  </div>

</body>
</html>

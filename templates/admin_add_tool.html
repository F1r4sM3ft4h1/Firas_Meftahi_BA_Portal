<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Werkzeug hinzufügen</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 20px;
      color: #222;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      width: 420px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: white;
      margin-top: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Neues Werkzeug hinzufügen</h1>

  <p><a href="{{ url_for('index') }}">Zurück zur Übersicht</a></p>

  <form method="POST">
    <label for="name">Werkzeugname</label>
    <input type="text" id="name" name="name" required>

    <label for="category">Kategorie</label>
    <input type="text" id="category" name="category">

    <label for="location">Lagerort</label>
    <input type="text" id="location" name="location">

    <label for="total_quantity">Gesamtbestand</label>
    <input type="number" id="total_quantity" name="total_quantity" min="1" value="1" required>

    <button type="submit">Werkzeug speichern</button>
  </form>
</body>
</html>

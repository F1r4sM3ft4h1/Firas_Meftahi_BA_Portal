<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainingsbilder Vollständigkeit</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      color: #222;
      text-align: center;
    }

    .box {
      background: white;
      width: calc(100% - 24px);
      max-width: 650px;
      margin: 18px auto;
      padding: 28px 22px;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }

    h1 {
      font-size: 32px;
      margin: 8px 0 14px 0;
      line-height: 1.15;
    }

    p {
      font-size: 18px;
      line-height: 1.45;
      color: #555;
      margin-bottom: 24px;
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tool-button {
      display: block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 18px 20px;
      border-radius: 12px;
      font-size: 22px;
      font-weight: bold;
    }

    .tool-button:hover {
      opacity: 0.9;
    }

    .back-link {
      display: block;
      margin-top: 24px;
      color: #2563eb;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Trainingsbilder Vollständigkeit</h1>

    <p>
      Wählen Sie ein Werkzeug aus. Danach öffnet sich die Kamera-Seite mit dem passenden Umriss.
    </p>

    <div class="tool-list">
      {% for key, tool in tools.items() %}
        <a class="tool-button" href="{{ url_for('training_voll_camera', tool_key=key) }}">
          {{ tool.display_name }}
        </a>
      {% endfor %}
    </div>

    <a class="back-link" href="{{ url_for('index') }}">Zur Admin-Übersicht</a>
  </div>

</body>
</html>
